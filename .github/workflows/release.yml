name: Release

# Tag-driven release: pushing a vX.Y.Z tag publishes @vieko/cli to npm via
# OIDC trusted publishing (no token, no OTP, with provenance). One-time
# setup: configure the trusted publisher for @vieko/cli on npmjs.com
# (GitHub Actions, repo vieko/vieko-cli, workflow release.yml).

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC for npm trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing (OIDC) needs npm >= 11.5.1; the runner ships older.
      - run: npm install -g npm@latest

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - run: npm test

      # OIDC trusted publishing: no NODE_AUTH_TOKEN, no OTP; provenance is automatic.
      - run: npm publish --access public
